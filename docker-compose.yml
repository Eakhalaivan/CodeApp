version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: microservices_db
    ports:
      - "3306:3306"
    volumes:
      - ./infrastructure/mysql:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-broker
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  redis:
    image: redis:alpine
    container_name: redis-cache
    ports:
      - "6379:6379"

  eureka-service:
    build: ./eureka-service
    ports:
      - "8761:8761"
    depends_on:
      - rabbitmq

  gateway-service:
    build: ./gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - eureka-service

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - eureka-service

  problem-service:
    build: ./problem-service
    ports:
      - "8082:8082"
    depends_on:
      - mysql
      - eureka-service

  submission-service:
    build: ./submission-service
    ports:
      - "8083:8083"
    depends_on:
      - mysql
      - rabbitmq
      - eureka-service

  execution-service:
    build: ./execution-service
    ports:
      - "8084:8084"
    depends_on:
      - rabbitmq
      - eureka-service
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Required to run sibling Docker containers for execution
